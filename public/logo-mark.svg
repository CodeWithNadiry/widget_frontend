<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Speech bubble (conversation / chat) -->
  <path
    d="M64 76c0-13.3 10.7-24 24-24h80c13.3 0 24 10.7 24 24v56c0 13.3-10.7 24-24 24h-52l-28 26v-26h0c-13.3 0-24-10.7-24-24V76z"
    fill="#f8fafc"
  />

  <!-- Doorway / key-hole notch referencing hospitality, cut from the bubble -->
  <path
    d="M116 156v-24c0-6.6 5.4-12 12-12s12 5.4 12 12v24z"
    fill="url(#bg)"
  />
  <circle cx="128" cy="120" r="7" fill="url(#bg)"/>

  <!-- Three dots suggesting an active chat, in the accent gradient -->
  <circle cx="96" cy="88" r="6" fill="url(#accent)"/>
  <circle cx="128" cy="88" r="6" fill="url(#accent)"/>
  <circle cx="160" cy="88" r="6" fill="url(#accent)"/>
</svg>
